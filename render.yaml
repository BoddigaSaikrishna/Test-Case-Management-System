# render.yaml — Render.com Deployment Blueprint
# This file defines both services for the Test Case Management System.
# 
# How to use:
#   1. Push this repo to GitHub
#   2. In Render dashboard → New → Blueprint → connect your repo
#   3. Render will detect this file and create both services
#   4. Fill in the secret env vars (marked sync: false) in the dashboard

services:
  # ─────────────────────────────────────────────
  # Backend: Node.js / Express API
  # ─────────────────────────────────────────────
  - type: web
    name: tcms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # Supabase — enter values in Render dashboard (never commit these)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # JWT secret — use a long random string in production
      - key: JWT_SECRET
        sync: false

      # CORS: comma-separated list of allowed frontend origins
      # Example: https://tcms-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

      # Skip Puppeteer Chromium download to keep builds fast & lean
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"

  # ─────────────────────────────────────────────
  # Frontend: React / Vite Static Site
  # ─────────────────────────────────────────────
  - type: static
    name: tcms-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Set this to your backend Render URL, e.g.:
      # https://tcms-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: all routes serve index.html (for React Router)
      - type: rewrite
        source: /*
        destination: /index.html
