# render.yaml — Render.com Deployment Blueprint
# This file defines both services for the Test Case Management System.
#
# NOTE: Render blueprints do NOT support type: static.
# The frontend is deployed as a web service using `npx serve` to serve the built dist folder.
#
# How to use:
#   1. In Render dashboard → New → Blueprint → connect your repo
#   2. Render will detect this file and create both services
#   3. Fill in the secret env vars (marked sync: false) in the dashboard

services:
  # ─────────────────────────────────────────────
  # Backend: Node.js / Express API
  # ─────────────────────────────────────────────
  - type: web
    name: tcms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"

  # ─────────────────────────────────────────────
  # Frontend: React / Vite (served via `serve`)
  # Note: type: static is not supported in render.yaml blueprints,
  # so we serve the Vite build output using the `serve` package.
  # ─────────────────────────────────────────────
  - type: web
    name: tcms-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT --single
    envVars:
      - key: VITE_API_URL
        sync: false
